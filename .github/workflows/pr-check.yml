name: PR Check

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  check:
    name: Type check, Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000/api/v1
          NEXT_PUBLIC_WS_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3001
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          GOOGLE_CLIENT_ID: placeholder
          GOOGLE_CLIENT_SECRET: placeholder
          MICROSOFT_CLIENT_ID: placeholder
          MICROSOFT_CLIENT_SECRET: placeholder

      - name: Notify success in Teams
        if: success()
        run: |
          curl -H "Content-Type: application/json" -d '{
            "text": "✅ **PR Check aprobado**\n**Repositorio:** ${{ github.repository }}\n**PR:** ${{ github.event.pull_request.title }}\n**Autor:** ${{ github.actor }}"
          }' ${{ secrets.TEAMS_WEBHOOK_URL }}

      - name: Notify failure in Teams
        if: failure()
        run: |
          curl -H "Content-Type: application/json" -d '{
            "text": "❌ **PR Check fallido**\n**Repositorio:** ${{ github.repository }}\n**PR:** ${{ github.event.pull_request.title }}\n**Autor:** ${{ github.actor }}"
          }' ${{ secrets.TEAMS_WEBHOOK_URL }}